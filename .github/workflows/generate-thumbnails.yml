on:
  push:
    paths:
      - 'images/*.jpg'
      - 'images/*.webp' # Track webp changes too
  workflow_dispatch: 

jobs:
  resize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp
        run: npm install sharp-cli -g

      - name: Create Thumbnails Folder
        run: mkdir -p images/thumbnails

      - name: Resize Images to 800px
        # This loop now finds both .jpg and .webp files
        run: |
          shopt -s nullglob
          for file in images/*.{jpg,webp,JPG,WEBP}; do
            filename=$(basename "$file")
            # This saves everything as a .jpg thumbnail for your HTML consistency
            sharp -i "$file" -o "images/thumbnails/${filename%.*}-thumb.jpg" resize 800
          done

      - name: Commit Thumbnails
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/thumbnails/
          git commit -m "Auto-generated thumbnails for JPG and WebP" || echo "No changes to commit"
          git push
